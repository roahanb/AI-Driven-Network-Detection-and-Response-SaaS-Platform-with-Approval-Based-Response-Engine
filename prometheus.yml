# Prometheus Configuration for AI-NDR Platform
# roahacks.com Deployment

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'roahacks-prod'
    environment: 'production'

scrape_configs:
  # AI-NDR Backend metrics
  - job_name: 'ai-ndr-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_timestamps: true
    scheme: 'http'

  # Docker Container Metrics (if using cAdvisor)
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # Node Exporter (server metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

# Alert Rules
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule Files
rule_files:
  - 'alert_rules.yml'
